name: Cython CI

on:
  push:
  pull_request:

jobs:
  cython-build-and-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system build tools
        run: sudo apt-get update && sudo apt-get install -y build-essential python3-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build Cython extension
        run: python setup_cython.py build_ext --inplace

      - name: Verify Cython symbols
        run: |
          python - <<'PY'
          from _vol_obi_fast import CBookSide, RollingStats, VolObiCalculator
          from _vol_obi_fast import price_change_bps_fast, dynamic_max_position_fast
          print("cython import ok")
          PY

      - name: Run targeted tests
        run: pytest -q tests/test_cbookside.py tests/test_vol_obi.py tests/test_orderbook.py tests/test_binance_obi.py tests/test_ws_operations.py
