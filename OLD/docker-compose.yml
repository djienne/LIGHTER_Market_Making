version: '3.8'
networks:
  default:
    driver: bridge
    ipam:
      config:
        - subnet: 172.32.44.0/22
services:
  lighter-data-collector:
    build: .
    container_name: lighter-collector
    restart: unless-stopped
    volumes:
      - ./:/app/
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - LOG_DIR=/app/logs
    command: python gather_lighter_data.py
    healthcheck:
      test: ["CMD-SHELL", "pgrep -f gather_lighter_data || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '0.5'

